name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

permissions:
    contents: write
    statuses: write

jobs:
    quality-gate:
        runs-on: ubuntu-latest
        env:
            APP_BASE_URL: "http://localhost:3000"
            AUTH_SECRET: "ci-local-auth-secret-please-change"
            DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/dueforge"
            DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/dueforge"
            SMTP_FROM_EMAIL: "ci@example.com"
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Typecheck
              run: npm run typecheck

            - name: Generate Prisma Client
              run: npm run db:generate

            - name: Build
              run: npm run build

            - name: 'notify vercel'
              uses: 'vercel/repository-dispatch/actions/status@v1'
              with:
                  name: "Vercel - dueforge: quality-gate"
